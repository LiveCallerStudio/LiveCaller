<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#53FC18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Live Caller Studio — Call In Live</title>
<style>
  :root{
    --green:#53FC18;
    --black:#0a0a0a;
    --panel:#131313;
    --panel-2:#181818;
    --line:#262626;
    --red:#ff3b3b;
    --text:#f2f2f2;
    --sub:#8f8f8f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(circle at 50% -10%, rgba(83,252,24,0.10), transparent 55%), var(--black);
    color:var(--text);
    font-family:'Arial Black','Helvetica Neue',Arial,sans-serif;
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:40px 16px;
  }

  .bolt{ position:fixed; opacity:.07; color:var(--green); font-size:140px;
    z-index:0; pointer-events:none; user-select:none; }
  .bolt.b1{top:-20px; left:-30px; transform:rotate(-12deg);}
  .bolt.b2{bottom:-40px; right:-30px; transform:rotate(8deg);}

  .wrap{position:relative; z-index:1; width:100%; max-width:400px;
    display:flex; flex-direction:column; align-items:center;}

  .brand{display:flex; align-items:center; gap:8px; margin-bottom:4px;}
  .brand-bolt{color:var(--green); font-size:20px;}
  .brand-name{font-size:16px; letter-spacing:2px; font-weight:900; text-transform:uppercase;}
  .brand-name span{color:var(--green);}
  .brand-tag{color:var(--sub); font-size:11px; letter-spacing:1.5px;
    text-transform:uppercase; margin-bottom:28px;}

  h1{font-size:26px; text-align:center; margin:0 0 8px;
    text-shadow:0 0 18px rgba(83,252,24,.3);}
  .sub{font-family:Arial,Helvetica,sans-serif; color:var(--sub); font-size:13.5px;
    text-align:center; margin:0 0 30px; line-height:1.6; max-width:320px;}

  /* ── Call button stage ── */
  .call-stage{
    position:relative; width:180px; height:180px;
    display:flex; align-items:center; justify-content:center; margin-bottom:14px;
  }
  .ring{position:absolute; border-radius:50%; border:2px solid var(--green); opacity:0; pointer-events:none;}
  .calling .ring{animation:pulse 1.8s ease-out infinite;}
  .calling .ring:nth-child(2){animation-delay:.6s !important;}
  .calling .ring:nth-child(3){animation-delay:1.2s !important;}
  @keyframes pulse{
    0%{width:120px;height:120px;opacity:.6;}
    100%{width:200px;height:200px;opacity:0;}
  }
  .call-btn{
    position:relative; z-index:2; width:120px; height:120px; border-radius:50%;
    background:linear-gradient(160deg, var(--panel-2), #0e0e0e);
    border:3px solid var(--green);
    box-shadow:0 0 30px rgba(83,252,24,.25), inset 0 0 20px rgba(0,0,0,.6);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:transform .15s ease, box-shadow .15s ease;
    color:var(--green);
  }
  .call-btn:active{transform:scale(0.95);}
  .call-btn:disabled{opacity:.4; cursor:not-allowed;}
  .call-btn svg{width:46px; height:46px;}
  .calling .call-btn{
    border-color:var(--green);
    box-shadow:0 0 36px rgba(83,252,24,.45), inset 0 0 20px rgba(0,0,0,.6);
  }
  .connected .call-btn{
    border-color:#3399ff; color:#3399ff;
    box-shadow:0 0 36px rgba(51,153,255,.35), inset 0 0 20px rgba(0,0,0,.6);
  }
  .on-hold .call-btn{
    border-color:var(--sub); color:var(--sub);
    box-shadow:none;
  }
  .on-air .call-btn{
    border-color:var(--red); color:var(--red);
    box-shadow:0 0 36px rgba(255,59,59,.45), inset 0 0 20px rgba(0,0,0,.6);
  }

  .status-text{
    font-family:Arial,Helvetica,sans-serif; font-size:13px; color:var(--sub);
    letter-spacing:1.5px; text-transform:uppercase; margin-bottom:24px; min-height:18px;
    text-align:center;
  }
  .status-text.green{color:var(--green);}
  .status-text.blue{color:#3399ff;}
  .status-text.red{color:var(--red);}
  .status-text.gold{color:#f5a623;}

  .panel{width:100%; background:var(--panel); border:1px solid var(--line);
    border-radius:14px; padding:20px; margin-bottom:16px; display:none;}
  .panel.show{display:block;}

  .field{margin-bottom:12px;}
  .field label{display:block; font-family:Arial,Helvetica,sans-serif; font-size:11px;
    color:var(--sub); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px;}
  .field input{width:100%; background:var(--black); border:1px solid var(--line);
    border-radius:8px; padding:11px 12px; color:var(--text);
    font-family:Arial,Helvetica,sans-serif; font-size:14px;}
  .field input:focus{outline:none; border-color:var(--green);}

  .btn{width:100%; padding:13px; border-radius:8px; border:none; cursor:pointer;
    font-family:Arial,Helvetica,sans-serif; font-weight:700; font-size:13px;
    letter-spacing:.5px; text-transform:uppercase; transition:filter .15s ease;}
  .btn-primary{background:var(--green); color:#0a0a0a;}
  .btn-primary:hover{filter:brightness(1.1);}
  .btn-danger{background:var(--red); color:#fff; margin-top:10px;}
  .btn-danger:hover{filter:brightness(1.15);}
  .btn:disabled{opacity:.4; cursor:not-allowed;}

  .call-info{
    width:100%; background:var(--panel); border:1px solid var(--line);
    border-radius:14px; padding:18px; display:none; text-align:center;
  }
  .call-info.show{display:block;}
  .call-info .label{font-size:11px; color:var(--sub); letter-spacing:1.5px;
    text-transform:uppercase; margin-bottom:4px;}
  .call-timer{font-size:32px; font-weight:900; color:var(--green);
    font-variant-numeric:tabular-nums; margin-bottom:8px;}
  .on-air-indicator{
    display:none; align-items:center; justify-content:center; gap:8px;
    background:rgba(255,59,59,.12); border:1px solid var(--red);
    border-radius:8px; padding:10px; margin-top:10px;
    color:var(--red); font-size:13px; font-weight:900; letter-spacing:1px;
    text-transform:uppercase;
  }
  .on-air-indicator.show{display:flex;}
  .on-air-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:blink 1s infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

  .hold-indicator{
    display:none; background:rgba(245,166,35,.1); border:1px solid #f5a623;
    color:#f5a623; border-radius:8px; padding:10px; margin-top:10px;
    font-size:13px; font-weight:700; text-align:center; letter-spacing:.5px;
  }
  .hold-indicator.show{display:block;}

  .error-banner{display:none; background:rgba(255,59,59,.12); border:1px solid var(--red);
    color:#ff8a8a; font-family:Arial,Helvetica,sans-serif; font-size:13px;
    padding:12px 14px; border-radius:8px; margin-bottom:16px; width:100%; line-height:1.4;}
  .error-banner.show{display:block;}

  .footnote{margin-top:24px; font-family:Arial,Helvetica,sans-serif; color:#4a4a4a;
    font-size:11px; text-align:center; letter-spacing:.3px; line-height:1.5; max-width:300px;}

  @media(max-width:400px){
    h1{font-size:22px;}
    .call-stage{width:160px; height:160px;}
    .call-btn{width:106px; height:106px;}
    .call-btn svg{width:40px; height:40px;}
  }
</style>
</head>
<body>

<div class="bolt b1">⚡</div>
<div class="bolt b2">⚡</div>

<div class="wrap">
  <div class="brand">
    <span class="brand-bolt">⚡</span>
    <span class="brand-name">LIVE <span>CALLER</span> STUDIO</span>
  </div>
  <div class="brand-tag">Live Call-In</div>

  <!-- Setup panel -->
  <div class="panel show" id="setupPanel">
    <div class="field">
      <label>Your Name <span style="color:#555;font-weight:400;text-transform:none;">(optional)</span></label>
      <input type="text" id="callerName" placeholder="What should we call you?" maxlength="40">
    </div>
    <div class="field">
      <label>City <span style="color:#555;font-weight:400;text-transform:none;">(optional)</span></label>
      <input type="text" id="callerCity" placeholder="Where are you calling from?" maxlength="40">
    </div>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <div class="call-stage" id="callStage">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <button class="call-btn" id="callBtn" aria-label="Start call">
      <!-- phone icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.68 12 19.79 19.79 0 0 1 1.61 3.5 2 2 0 0 1 3.6 1.32h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6.13 6.13l.96-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
      </svg>
    </button>
  </div>

  <div class="status-text" id="statusText">Tap to call in live</div>

  <!-- Active call info -->
  <div class="call-info" id="callInfo">
    <div class="label">Call Duration</div>
    <div class="call-timer" id="callTimer">0:00</div>
    <div class="on-air-indicator" id="onAirIndicator">
      <span class="on-air-dot"></span> YOU ARE ON AIR
    </div>
    <div class="hold-indicator" id="holdIndicator">⏸ You are on hold — please wait</div>
    <button class="btn btn-danger" id="endCallBtn">End Call</button>
  </div>

  <!-- Remote audio (producer's voice) -->
  <audio id="remoteAudio" autoplay style="display:none;"></audio>

  <div class="footnote">By calling in, you agree your voice may be broadcast live on air.</div>
</div>

<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import {
  getFirestore, doc, collection, addDoc,
  setDoc, onSnapshot, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyDNVCh-ayI5GzeboqKbQoFI5vsfSF8IaCc",
  authDomain:        "djdeeze-hotline.firebaseapp.com",
  projectId:         "djdeeze-hotline",
  storageBucket:     "djdeeze-hotline.firebasestorage.app",
  messagingSenderId: "663942225296",
  appId:             "1:663942225296:web:c6117cf6c23656b9842715"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const iceConfig = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun2.l.google.com:19302' },
  ]
};

const callStage      = document.getElementById('callStage');
const callBtn        = document.getElementById('callBtn');
const statusText     = document.getElementById('statusText');
const setupPanel     = document.getElementById('setupPanel');
const callInfo       = document.getElementById('callInfo');
const callTimer      = document.getElementById('callTimer');
const onAirIndicator = document.getElementById('onAirIndicator');
const holdIndicator  = document.getElementById('holdIndicator');
const endCallBtn     = document.getElementById('endCallBtn');
const remoteAudio    = document.getElementById('remoteAudio');
const errorBanner    = document.getElementById('errorBanner');

let pc = null;
let localStream = null;
let callId = null;
let callDocRef = null;
let timerInterval = null;
let callSeconds = 0;
let callUnsubscribe = null;
let candidateUnsubscribe = null;
let callState = 'idle'; // idle | ringing | screening | on-hold | on-air | ended

function setStatus(text, color = ''){
  statusText.textContent = text;
  statusText.className = 'status-text' + (color ? ' ' + color : '');
}

function showError(msg){
  errorBanner.textContent = msg;
  errorBanner.classList.add('show');
}

function startTimer(){
  callSeconds = 0;
  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    callSeconds++;
    const m = Math.floor(callSeconds / 60);
    const s = callSeconds % 60;
    callTimer.textContent = `${m}:${s.toString().padStart(2,'0')}`;
  }, 1000);
}

function updateUI(status){
  callState = status;
  callStage.className = 'call-stage ' + (status !== 'idle' && status !== 'ended' ? status : '');

  onAirIndicator.classList.toggle('show', status === 'on-air');
  holdIndicator.classList.toggle('show', status === 'on-hold');

  if(status === 'ringing'){
    setStatus('Ringing… please wait', 'green');
    setupPanel.classList.remove('show');
    callInfo.classList.remove('show');
  }
  if(status === 'screening'){
    setStatus('Connected — you\'re being screened', 'blue');
    callInfo.classList.add('show');
    startTimer();
  }
  if(status === 'on-hold'){
    setStatus('On hold — standby', 'gold');
  }
  if(status === 'on-air'){
    setStatus('YOU ARE LIVE ON AIR', 'red');
  }
  if(status === 'ended' || status === 'rejected'){
    setStatus('Call ended', '');
    callInfo.classList.remove('show');
    callStage.className = 'call-stage';
    clearInterval(timerInterval);
    cleanupCall();
    // Auto-close after 3 seconds
    setTimeout(()=>{
      window.close();
      document.body.innerHTML = `
        <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;
          justify-content:center;background:#0a0a0a;color:#f2f2f2;font-family:Arial,sans-serif;
          text-align:center;padding:40px 20px;gap:16px;">
          <div style="font-size:48px;">📞</div>
          <div style="font-size:20px;font-weight:900;">Call Ended</div>
          <div style="font-size:14px;color:#888;">Thanks for calling in. You can close this window.</div>
        </div>`;
    }, 3000);
  }
}

function cleanupCall(){
  if(callUnsubscribe){ callUnsubscribe(); callUnsubscribe = null; }
  if(candidateUnsubscribe){ candidateUnsubscribe(); candidateUnsubscribe = null; }
  if(pc){ pc.close(); pc = null; }
  if(localStream){ localStream.getTracks().forEach(t=>t.stop()); localStream = null; }
  remoteAudio.srcObject = null;
  callBtn.disabled = false;
}

async function startCall(){
  errorBanner.classList.remove('show');
  callBtn.disabled = true;

  // 1. Get mic
  try{
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  }catch(err){
    showError('Microphone access denied. Please allow mic permissions and try again.');
    callBtn.disabled = false;
    return;
  }

  // 2. Create peer connection
  pc = new RTCPeerConnection(iceConfig);
  localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

  // 3. Handle producer audio
  pc.ontrack = (event)=>{
    if(event.streams && event.streams[0]){
      remoteAudio.srcObject = event.streams[0];
    }
  };

  // 4. Generate call ID
  callId = Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
  callDocRef = doc(db, 'calls', callId);

  // 5. Collect ICE candidates (save them BEFORE creating offer)
  pc.onicecandidate = async(event)=>{
    if(event.candidate && callId){
      await addDoc(collection(db, 'calls', callId, 'callerCandidates'), event.candidate.toJSON());
    }
  };

  // 6. Create offer
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  // 7. Write call to Firestore
  await setDoc(callDocRef, {
    status: 'ringing',
    callerName: document.getElementById('callerName').value.trim() || 'Anonymous Caller',
    callerCity: document.getElementById('callerCity').value.trim() || null,
    offer: { type: offer.type, sdp: offer.sdp },
    createdAt: serverTimestamp()
  });

  updateUI('ringing');

  // 8. Listen for answer + status changes
  callUnsubscribe = onSnapshot(callDocRef, async(snap)=>{
    const data = snap.data();
    if(!data) return;

    // Set remote description when answer arrives
    if(data.answer && !pc.currentRemoteDescription){
      try{
        await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
      }catch(e){ console.error('setRemoteDescription failed:', e); }
    }

    // React to status changes from producer
    if(data.status && data.status !== callState){
      updateUI(data.status);
    }
  });

  // 9. Listen for producer ICE candidates
  candidateUnsubscribe = onSnapshot(
    collection(db, 'calls', callId, 'producerCandidates'),
    (snap)=>{
      snap.docChanges().forEach(async(change)=>{
        if(change.type === 'added' && pc){
          try{
            await pc.addIceCandidate(new RTCIceCandidate(change.doc.data()));
          }catch(e){ console.error('addIceCandidate failed:', e); }
        }
      });
    }
  );
}

callBtn.addEventListener('click', ()=>{
  if(callState === 'idle' || callState === 'ended'){
    startCall();
  }
});

endCallBtn.addEventListener('click', async()=>{
  if(callDocRef){
    await setDoc(callDocRef, { status: 'ended' }, { merge: true });
  }
  updateUI('ended');
});
</script>
</body>
</html>
