<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Caller Studio — OBS Overlay</title>
<style>
  html,body{
    margin:0; padding:0; background:transparent; overflow:hidden;
    width:100%; height:100%;
    font-family:'Arial Black','Helvetica Neue',Arial,sans-serif;
  }
  :root{
    --green:#53FC18;
    --black:#0a0a0a;
  }

  .lower-third{
    position:fixed;
    left:40px;
    bottom:50px;
    display:flex;
    align-items:center;
    gap:0;
    transform:translateX(-120%);
    opacity:0;
    transition:transform .55s cubic-bezier(.2,.9,.25,1), opacity .35s ease;
  }
  .lower-third.show{
    transform:translateX(0);
    opacity:1;
  }

  .mic-badge{
    width:64px; height:64px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #1c1c1c, var(--black));
    border:3px solid var(--green);
    box-shadow:0 0 24px rgba(83,252,24,0.5);
    display:flex; align-items:center; justify-content:center;
    color:var(--green);
    position:relative; z-index:2;
    flex-shrink:0;
  }
  .mic-badge svg{width:28px; height:28px;}
  .mic-badge .pulse{
    position:absolute; inset:-8px; border-radius:50%; border:2px solid var(--green);
    opacity:0; animation:micpulse 1.6s ease-out infinite;
  }
  @keyframes micpulse{
    0%{transform:scale(0.85); opacity:.7;}
    100%{transform:scale(1.5); opacity:0;}
  }

  .text-block{
    background:linear-gradient(90deg, rgba(10,10,10,0.95), rgba(10,10,10,0.85) 85%, rgba(10,10,10,0));
    border-top:2px solid var(--green);
    border-bottom:2px solid var(--green);
    padding:10px 38px 10px 24px;
    margin-left:-14px;
    z-index:1;
  }
  .title-row{
    display:flex; align-items:center; gap:8px;
    color:var(--green); font-size:13px; letter-spacing:2px; text-transform:uppercase;
    font-weight:900; margin-bottom:2px;
  }
  .title-row .bolt{font-size:14px;}
  .username{
    color:#ffffff; font-size:24px; font-weight:900; letter-spacing:.5px;
    text-shadow:0 0 14px rgba(0,0,0,0.8);
  }
  .city{
    color:#b8b8b8; font-size:13px; font-weight:400; font-family:Arial,Helvetica,sans-serif;
    margin-top:1px;
  }

  /* reduced motion */
  @media (prefers-reduced-motion: reduce){
    .lower-third{transition:opacity .3s ease; transform:none !important;}
    .mic-badge .pulse{animation:none;}
  }
</style>
</head>
<body>

<div class="lower-third" id="lowerThird">
  <div class="mic-badge">
    <div class="pulse"></div>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
  </div>
  <div class="text-block">
    <div class="title-row"><span class="bolt">⚡</span> LIVE CALLER</div>
    <div class="username" id="usernameEl">—</div>
    <div class="city" id="cityEl"></div>
  </div>
</div>

<audio id="overlayAudio" style="display:none;"></audio>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  // ====== PASTE THE SAME FIREBASE CONFIG AS index.html / dashboard.html ======
  const firebaseConfig = {
    apiKey: "AIzaSyDNVCh-ayI5GzeboqKbQoFI5vsfSF8IaCc",
    authDomain: "djdeeze-hotline.firebaseapp.com",
    projectId: "djdeeze-hotline",
    storageBucket: "djdeeze-hotline.firebasestorage.app",
    messagingSenderId: "663942225296",
    appId: "1:663942225296:web:c6117cf6c23656b9842715"
  };
  // ============================================================================

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const liveStateRef = doc(db, 'hotlineLive', 'nowPlaying');

  const lowerThird = document.getElementById('lowerThird');
  const usernameEl = document.getElementById('usernameEl');
  const cityEl = document.getElementById('cityEl');
  const overlayAudio = document.getElementById('overlayAudio');
  let lastUrl = null;

  onSnapshot(liveStateRef, (snap)=>{
    const data = snap.data();
    if(data && data.active){
      usernameEl.textContent = data.name || 'Anonymous Caller';
      cityEl.textContent = data.city || '';
      lowerThird.classList.add('show');
      if(data.audioUrl && data.audioUrl !== lastUrl){
        lastUrl = data.audioUrl;
        overlayAudio.src = data.audioUrl;
        overlayAudio.play().catch(()=>{
          console.warn('Autoplay blocked — click once anywhere on the OBS browser source to enable audio.');
        });
      }
    } else {
      lowerThird.classList.remove('show');
      overlayAudio.pause();
      lastUrl = null;
    }
  });
</script>
</body>
</html>
