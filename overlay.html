<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Caller Studio — OBS Overlay</title>
<style>
  :root{ --green:#53FC18; --red:#ff3b3b; }
  html,body{
    margin:0; padding:0; background:transparent; overflow:hidden;
    width:1920px; height:1080px;
    font-family:'Arial Black','Helvetica Neue',Arial,sans-serif;
  }

  /* ── Lower Third ── */
  .lower-third{
    position:fixed; left:40px; bottom:50px;
    display:flex; align-items:center;
    transform:translateX(-130%); opacity:0;
    transition:transform .55s cubic-bezier(.2,.9,.25,1), opacity .35s ease;
    z-index:10;
  }
  .lower-third.show{ transform:translateX(0); opacity:1; }

  .mic-badge{
    width:68px; height:68px; border-radius:50%; flex-shrink:0;
    background:radial-gradient(circle at 35% 30%, #1c1c1c, #0a0a0a);
    border:3px solid var(--green);
    box-shadow:0 0 28px rgba(83,252,24,0.55);
    display:flex; align-items:center; justify-content:center;
    color:var(--green); position:relative; z-index:2;
    transition:border-color .3s ease, box-shadow .3s ease, color .3s ease;
  }
  .mic-badge svg{ width:30px; height:30px; }
  .mic-badge .pulse{
    position:absolute; inset:-10px; border-radius:50%;
    border:2px solid var(--green); opacity:0;
    animation:micpulse 1.6s ease-out infinite;
  }
  @keyframes micpulse{
    0%{ transform:scale(.85); opacity:.7; }
    100%{ transform:scale(1.55); opacity:0; }
  }
  .text-block{
    background:linear-gradient(90deg, rgba(10,10,10,0.96), rgba(10,10,10,0.82) 80%, transparent);
    border-top:2px solid var(--green); border-bottom:2px solid var(--green);
    padding:10px 42px 10px 26px; margin-left:-14px; z-index:1;
    transition:border-color .3s ease;
  }
  .lt-label{
    color:var(--green); font-size:12px; letter-spacing:2.5px;
    text-transform:uppercase; font-weight:900; margin-bottom:2px;
    transition:color .3s ease;
  }
  .lt-name{ color:#fff; font-size:26px; font-weight:900; letter-spacing:.5px; text-shadow:0 0 16px rgba(0,0,0,.9); }
  .lt-city{ color:#b8b8b8; font-size:13px; font-weight:400; font-family:Arial,Helvetica,sans-serif; margin-top:2px; }
  .lt-type{ font-size:11px; color:var(--green); letter-spacing:1px; text-transform:uppercase; margin-top:3px; font-family:Arial,Helvetica,sans-serif; font-weight:700; transition:color .3s ease; }

  /* Live call = red theme */
  .lower-third.livecall .mic-badge{ border-color:var(--red); box-shadow:0 0 28px rgba(255,59,59,0.55); color:var(--red); }
  .lower-third.livecall .text-block{ border-top-color:var(--red); border-bottom-color:var(--red); }
  .lower-third.livecall .lt-label{ color:var(--red); }
  .lower-third.livecall .lt-type{ color:var(--red); }
  .lower-third.livecall .pulse{ border-color:var(--red); }

  /* ── Incoming Call Notification ── */
  .incoming-call{
    position:fixed; top:40px; right:40px;
    display:flex; align-items:center; gap:14px;
    background:rgba(10,10,10,0.94); border:2px solid var(--green);
    border-radius:16px; padding:14px 20px;
    box-shadow:0 0 40px rgba(83,252,24,0.3);
    transform:translateY(-140%); opacity:0;
    transition:transform .45s cubic-bezier(.2,.9,.25,1), opacity .3s ease;
    z-index:10;
  }
  .incoming-call.show{ transform:translateY(0); opacity:1; }
  .incoming-ring{
    width:52px; height:52px; border-radius:50%; border:2px solid var(--green);
    display:flex; align-items:center; justify-content:center; color:var(--green);
    animation:ringpulse 1s ease-in-out infinite;
  }
  @keyframes ringpulse{ 0%,100%{box-shadow:0 0 0 0 rgba(83,252,24,.5);} 50%{box-shadow:0 0 0 10px rgba(83,252,24,0);} }
  .incoming-ring svg{ width:24px; height:24px; }
  .incoming-label{ font-size:11px; color:var(--green); letter-spacing:2px; text-transform:uppercase; font-weight:900; }
  .incoming-count{ font-size:22px; font-weight:900; color:#fff; }
  .incoming-sub{ font-size:12px; color:#888; font-family:Arial,Helvetica,sans-serif; }

  /* ── Queue Badge ── */
  .queue-badge{
    position:fixed; bottom:50px; right:40px;
    display:flex; align-items:center; gap:10px;
    background:rgba(10,10,10,0.88); border:1px solid rgba(83,252,24,0.4);
    border-radius:12px; padding:10px 16px;
    opacity:0; transform:scale(.85);
    transition:opacity .3s ease, transform .3s ease;
    z-index:10;
  }
  .queue-badge.show{ opacity:1; transform:scale(1); }
  .queue-dot{ width:8px; height:8px; border-radius:50%; background:var(--green); animation:blink 1.4s infinite; }
  @keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:.2;} }
  .queue-num{ font-size:20px; font-weight:900; color:var(--green); }
  .queue-lbl{ font-size:11px; color:#666; text-transform:uppercase; letter-spacing:1px; font-family:Arial,Helvetica,sans-serif; font-weight:700; }
</style>
</head>
<body>

<!-- Lower Third -->
<div class="lower-third" id="lowerThird">
  <div class="mic-badge">
    <div class="pulse"></div>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
  </div>
  <div class="text-block">
    <div class="lt-label" id="ltLabel">⚡ LIVE CALLER</div>
    <div class="lt-name" id="ltName">—</div>
    <div class="lt-city" id="ltCity"></div>
    <div class="lt-type" id="ltType"></div>
  </div>
</div>

<!-- Incoming Call Notification -->
<div class="incoming-call" id="incomingCall">
  <div class="incoming-ring">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.68 12 19.79 19.79 0 0 1 1.61 3.5 2 2 0 0 1 3.6 1.32h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6.13 6.13l.96-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
    </svg>
  </div>
  <div>
    <div class="incoming-label">Incoming Message</div>
    <div class="incoming-count" id="incomingCount">1 waiting</div>
    <div class="incoming-sub">Live Caller Studio</div>
  </div>
</div>

<!-- Queue Counter -->
<div class="queue-badge" id="queueBadge">
  <div class="queue-dot"></div>
  <div class="queue-num" id="queueNum">0</div>
  <div class="queue-lbl">Waiting</div>
</div>

<!-- Audio — voice messages play here. Live calls play through dashboard browser source in OBS -->
<audio id="overlayAudio" autoplay playsinline style="display:none;"></audio>

<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import {
  getFirestore, doc, collection, query, orderBy, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyDNVCh-ayI5GzeboqKbQoFI5vsfSF8IaCc",
  authDomain:        "djdeeze-hotline.firebaseapp.com",
  projectId:         "djdeeze-hotline",
  storageBucket:     "djdeeze-hotline.firebasestorage.app",
  messagingSenderId: "663942225296",
  appId:             "1:663942225296:web:c6117cf6c23656b9842715"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

const liveStateRef = doc(db, 'hotlineLive', 'nowPlaying');

const lowerThird    = document.getElementById('lowerThird');
const ltLabel       = document.getElementById('ltLabel');
const ltName        = document.getElementById('ltName');
const ltCity        = document.getElementById('ltCity');
const ltType        = document.getElementById('ltType');
const incomingCall  = document.getElementById('incomingCall');
const incomingCount = document.getElementById('incomingCount');
const queueBadge    = document.getElementById('queueBadge');
const queueNum      = document.getElementById('queueNum');
const overlayAudio  = document.getElementById('overlayAudio');

let lastUrl = null;
let incomingTimer = null;
let prevCount = 0;

const typeLabels = {
  general:    '🎙️ Voice Message',
  song:       '🎵 Song Request',
  shoutout:   '📢 Shout-Out',
  birthday:   '🎂 Birthday',
  dedication: '💌 Dedication'
};

signInAnonymously(auth).then(()=>{

  // ── Live state → lower third + audio ──
  onSnapshot(liveStateRef, (snap)=>{
    const data = snap.data();

    if(data && data.active){
      const isLiveCall = data.messageType === 'livecall';

      // Set name and city
      ltName.textContent = data.name || 'Live Caller';
      ltCity.textContent = data.city || '';

      if(isLiveCall){
        // LIVE CALL — red theme, no audio here (OBS captures dashboard browser source)
        lowerThird.classList.add('livecall');
        ltLabel.textContent = '🔴 LIVE CALL';
        ltType.textContent = 'On Air';
        // Stop any voice message audio that was playing
        overlayAudio.pause();
        overlayAudio.src = '';
        lastUrl = null;
      } else {
        // VOICE MESSAGE — green theme, play audio through overlay
        lowerThird.classList.remove('livecall');
        ltLabel.textContent = '⚡ LIVE CALLER';
        ltType.textContent = typeLabels[data.messageType] || '';

        // Play audio — muted-then-unmute is the OBS autoplay fix
        if(data.audioUrl && data.audioUrl !== lastUrl){
          lastUrl = data.audioUrl;
          overlayAudio.src = data.audioUrl;
          overlayAudio.muted = true;
          overlayAudio.play().then(()=>{
            overlayAudio.muted = false;
          }).catch(()=>{
            // Last resort fallback — try unmuted directly
            overlayAudio.muted = false;
            overlayAudio.play().catch(()=>{});
          });
        }
      }

      lowerThird.classList.add('show');

    } else {
      // Nothing on air — hide everything and stop audio
      lowerThird.classList.remove('show');
      lowerThird.classList.remove('livecall');
      overlayAudio.pause();
      overlayAudio.currentTime = 0;
      overlayAudio.src = '';
      lastUrl = null;
    }
  });

  // ── Queue counter + incoming notification ──
  onSnapshot(
    query(collection(db, 'hotlineMessages'), orderBy('createdAt', 'desc')),
    (snap)=>{
      const count = snap.docs.filter(d => d.data().status === 'pending').length;

      queueNum.textContent = count;
      count > 0 ? queueBadge.classList.add('show') : queueBadge.classList.remove('show');

      if(count > prevCount){
        incomingCount.textContent = `${count} waiting`;
        incomingCall.classList.add('show');
        clearTimeout(incomingTimer);
        incomingTimer = setTimeout(()=> incomingCall.classList.remove('show'), 4500);
      }
      prevCount = count;
    }
  );

}).catch(err=> console.error('Overlay auth error:', err.code));
</script>
</body>
</html>
