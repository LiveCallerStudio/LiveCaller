<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Caller Studio — OBS Overlay</title>
<style>
  :root{
    --green:#53FC18;
    --black:#0a0a0a;
    --red:#ff3b3b;
    --gold:#f5a623;
  }
  html,body{
    margin:0; padding:0; background:transparent; overflow:hidden;
    width:1920px; height:1080px;
    font-family:'Arial Black','Helvetica Neue',Arial,sans-serif;
  }

  /* ─────────────────────────────────────────
     1. LOWER THIRD — caller name + city
     Slides in from left when a message plays
  ───────────────────────────────────────── */
  .lower-third{
    position:fixed; left:40px; bottom:50px;
    display:flex; align-items:center;
    transform:translateX(-130%); opacity:0;
    transition:transform .55s cubic-bezier(.2,.9,.25,1), opacity .35s ease;
  }
  .lower-third.show{ transform:translateX(0); opacity:1; }

  .mic-badge{
    width:68px; height:68px; border-radius:50%; flex-shrink:0;
    background:radial-gradient(circle at 35% 30%, #1c1c1c, var(--black));
    border:3px solid var(--green);
    box-shadow:0 0 28px rgba(83,252,24,0.55);
    display:flex; align-items:center; justify-content:center;
    color:var(--green); position:relative; z-index:2;
  }
  .mic-badge svg{ width:30px; height:30px; }
  .mic-badge .pulse{
    position:absolute; inset:-10px; border-radius:50%;
    border:2px solid var(--green); opacity:0;
    animation:micpulse 1.6s ease-out infinite;
  }
  @keyframes micpulse{
    0%{ transform:scale(.85); opacity:.7; }
    100%{ transform:scale(1.55); opacity:0; }
  }

  .text-block{
    background:linear-gradient(90deg, rgba(10,10,10,0.96), rgba(10,10,10,0.82) 80%, transparent);
    border-top:2px solid var(--green); border-bottom:2px solid var(--green);
    padding:10px 42px 10px 26px; margin-left:-14px; z-index:1;
  }
  .lt-label{
    color:var(--green); font-size:12px; letter-spacing:2.5px;
    text-transform:uppercase; font-weight:900; margin-bottom:2px;
    display:flex; align-items:center; gap:6px;
  }
  .lt-name{
    color:#fff; font-size:26px; font-weight:900; letter-spacing:.5px;
    text-shadow:0 0 16px rgba(0,0,0,.9);
  }
  .lt-city{
    color:#b8b8b8; font-size:13px; font-weight:400;
    font-family:Arial,Helvetica,sans-serif; margin-top:2px;
  }
  .lt-type{
    font-size:11px; color:var(--green); letter-spacing:1px;
    text-transform:uppercase; margin-top:3px;
    font-family:Arial,Helvetica,sans-serif; font-weight:700;
  }

  /* ─────────────────────────────────────────
     2. INCOMING CALL ANIMATION
     Drops in from top-right when a NEW message
     arrives in the queue. Auto-hides after 4s.
  ───────────────────────────────────────── */
  .incoming-call{
    position:fixed; top:40px; right:40px;
    display:flex; align-items:center; gap:14px;
    background:rgba(10,10,10,0.94); border:2px solid var(--green);
    border-radius:16px; padding:14px 20px;
    box-shadow:0 0 40px rgba(83,252,24,0.3);
    transform:translateY(-140%); opacity:0;
    transition:transform .45s cubic-bezier(.2,.9,.25,1), opacity .3s ease;
  }
  .incoming-call.show{ transform:translateY(0); opacity:1; }

  .incoming-ring{
    width:52px; height:52px; border-radius:50%; border:2px solid var(--green);
    display:flex; align-items:center; justify-content:center;
    color:var(--green); position:relative; flex-shrink:0;
    animation:ringpulse 1s ease-in-out infinite;
  }
  @keyframes ringpulse{
    0%,100%{ box-shadow:0 0 0 0 rgba(83,252,24,.5); }
    50%{ box-shadow:0 0 0 10px rgba(83,252,24,0); }
  }
  .incoming-ring svg{ width:24px; height:24px; }

  .incoming-text{ line-height:1.3; }
  .incoming-label{
    font-size:11px; color:var(--green); letter-spacing:2px;
    text-transform:uppercase; font-weight:900;
  }
  .incoming-count{
    font-size:22px; font-weight:900; color:#fff;
  }
  .incoming-sub{
    font-size:12px; color:#888; font-family:Arial,Helvetica,sans-serif; font-weight:400;
  }

  /* ─────────────────────────────────────────
     3. QUEUE COUNTER BADGE
     Always-visible bottom-right counter
     showing how many messages are waiting.
     Hides when queue is empty.
  ───────────────────────────────────────── */
  .queue-badge{
    position:fixed; bottom:50px; right:40px;
    display:flex; align-items:center; gap:10px;
    background:rgba(10,10,10,0.88); border:1px solid rgba(83,252,24,0.4);
    border-radius:12px; padding:10px 16px;
    opacity:0; transform:scale(.85);
    transition:opacity .3s ease, transform .3s ease;
  }
  .queue-badge.show{ opacity:1; transform:scale(1); }
  .queue-dot{
    width:8px; height:8px; border-radius:50%; background:var(--green);
    animation:blink 1.4s infinite;
  }
  @keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:.2;} }
  .queue-num{
    font-size:20px; font-weight:900; color:var(--green);
    font-variant-numeric:tabular-nums;
  }
  .queue-lbl{
    font-size:11px; color:#666; text-transform:uppercase; letter-spacing:1px;
    font-family:Arial,Helvetica,sans-serif; font-weight:700;
  }

  /* ─────────────────────────────────────────
     4. SONG REQUEST OVERLAY
     Slides in from right when a song-request
     message goes on air.
  ───────────────────────────────────────── */
  .song-overlay{
    position:fixed; top:50%; right:40px;
    transform:translateX(140%) translateY(-50%);
    opacity:0;
    transition:transform .5s cubic-bezier(.2,.9,.25,1), opacity .3s ease;
    background:rgba(10,10,10,0.94); border:2px solid var(--green);
    border-radius:14px; padding:18px 22px; min-width:260px; max-width:340px;
  }
  .song-overlay.show{
    transform:translateX(0) translateY(-50%);
    opacity:1;
  }
  .song-overlay-label{
    font-size:10px; color:var(--green); letter-spacing:2px;
    text-transform:uppercase; font-weight:900; margin-bottom:6px;
    display:flex; align-items:center; gap:6px;
  }
  .song-overlay-note{
    font-size:11px; color:var(--gold); font-family:Arial,Helvetica,sans-serif;
    letter-spacing:.5px; font-weight:700; text-transform:uppercase; margin-bottom:8px;
  }
  .song-overlay-artist{
    font-size:13px; color:#aaa; font-family:Arial,Helvetica,sans-serif; font-weight:400;
    margin-bottom:2px;
  }
  .song-overlay-track{
    font-size:20px; font-weight:900; color:#fff; line-height:1.2;
  }
  .song-overlay-from{
    font-size:12px; color:#666; font-family:Arial,Helvetica,sans-serif;
    margin-top:8px;
  }

  /* reduced motion */
  @media (prefers-reduced-motion: reduce){
    .lower-third, .incoming-call, .song-overlay{ transition:opacity .3s ease; transform:none !important; }
    .mic-badge .pulse, .incoming-ring{ animation:none; }
  }
</style>
</head>
<body>

<!-- 1. Lower Third -->
<div class="lower-third" id="lowerThird">
  <div class="mic-badge">
    <div class="pulse"></div>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
  </div>
  <div class="text-block">
    <div class="lt-label">⚡ LIVE CALLER</div>
    <div class="lt-name" id="ltName">—</div>
    <div class="lt-city" id="ltCity"></div>
    <div class="lt-type" id="ltType"></div>
  </div>
</div>

<!-- 2. Incoming Call Notification -->
<div class="incoming-call" id="incomingCall">
  <div class="incoming-ring">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.68 12 19.79 19.79 0 0 1 1.61 3.5 2 2 0 0 1 3.6 1.32h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6.13 6.13l.96-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
    </svg>
  </div>
  <div class="incoming-text">
    <div class="incoming-label">Incoming Message</div>
    <div class="incoming-count" id="incomingCount">1 waiting</div>
    <div class="incoming-sub">Live Caller Studio</div>
  </div>
</div>

<!-- 3. Queue Counter -->
<div class="queue-badge" id="queueBadge">
  <div class="queue-dot"></div>
  <div class="queue-num" id="queueNum">0</div>
  <div class="queue-lbl">Waiting</div>
</div>

<!-- 4. Song Request Overlay -->
<div class="song-overlay" id="songOverlay">
  <div class="song-overlay-label">🎵 Song Request</div>
  <div class="song-overlay-note" id="songNote"></div>
  <div class="song-overlay-artist" id="songArtist"></div>
  <div class="song-overlay-track" id="songTrack"></div>
  <div class="song-overlay-from" id="songFrom"></div>
</div>

<audio id="overlayAudio" style="display:none;"></audio>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
  import {
    getFirestore, doc, collection, query, where,
    onSnapshot, orderBy
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDNVCh-ayI5GzeboqKbQoFI5vsfSF8IaCc",
    authDomain: "djdeeze-hotline.firebaseapp.com",
    projectId: "djdeeze-hotline",
    storageBucket: "djdeeze-hotline.firebasestorage.app",
    messagingSenderId: "663942225296",
    appId: "1:663942225296:web:c6117cf6c23656b9842715"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const liveStateRef = doc(db, 'hotlineLive', 'nowPlaying');

  // Elements
  const lowerThird   = document.getElementById('lowerThird');
  const ltName       = document.getElementById('ltName');
  const ltCity       = document.getElementById('ltCity');
  const ltType       = document.getElementById('ltType');
  const incomingCall = document.getElementById('incomingCall');
  const incomingCount= document.getElementById('incomingCount');
  const queueBadge   = document.getElementById('queueBadge');
  const queueNum     = document.getElementById('queueNum');
  const songOverlay  = document.getElementById('songOverlay');
  const songNote     = document.getElementById('songNote');
  const songArtist   = document.getElementById('songArtist');
  const songTrack    = document.getElementById('songTrack');
  const songFrom     = document.getElementById('songFrom');
  const overlayAudio = document.getElementById('overlayAudio');

  let lastUrl = null;
  let incomingTimer = null;
  let prevQueueCount = 0;

  const typeLabels = {
    general:'🎙️ Voice Message', song:'🎵 Song Request',
    shoutout:'📢 Shout-Out', birthday:'🎂 Birthday',
    dedication:'💌 Dedication'
  };

  signInAnonymously(auth).then(()=>{

    // ── 1. Live state — lower third + song overlay ──
    onSnapshot(liveStateRef, (snap)=>{
      const data = snap.data();
      if(data && data.active){
        // Lower third
        ltName.textContent = data.name || 'Anonymous Caller';
        ltCity.textContent = data.city || '';
        ltType.textContent = typeLabels[data.messageType] || '';
        lowerThird.classList.add('show');

        // Song request overlay — only for song type
        if(data.messageType === 'song' && (data.songArtist || data.songTrack)){
          songNote.textContent = 'Now Playing Request';
          songArtist.textContent = data.songArtist || '';
          songTrack.textContent = data.songTrack || '';
          songFrom.textContent = data.name ? `Requested by ${data.name}` : '';
          songOverlay.classList.add('show');
        } else {
          songOverlay.classList.remove('show');
        }

        // Audio playback
        if(data.audioUrl && data.audioUrl !== lastUrl){
          lastUrl = data.audioUrl;
          overlayAudio.src = data.audioUrl;
          overlayAudio.play().catch(()=>{});
        }
      } else {
        lowerThird.classList.remove('show');
        songOverlay.classList.remove('show');
        overlayAudio.pause();
        lastUrl = null;
      }
    });

    // ── 2 & 3. Queue — incoming call notification + counter ──
    const queueQ = query(
      collection(db, 'hotlineMessages'),
      where('status', '==', 'pending'),
      orderBy('createdAt', 'desc')
    );

    onSnapshot(queueQ, (snap)=>{
      const count = snap.size;

      // Queue counter badge
      queueNum.textContent = count;
      if(count > 0){
        queueBadge.classList.add('show');
      } else {
        queueBadge.classList.remove('show');
      }

      // Incoming call notification — fires when count goes UP
      if(count > prevQueueCount){
        const newCount = count - prevQueueCount;
        incomingCount.textContent = `${count} waiting`;
        incomingCall.classList.add('show');
        // Clear any existing timer
        if(incomingTimer) clearTimeout(incomingTimer);
        incomingTimer = setTimeout(()=>{
          incomingCall.classList.remove('show');
        }, 4500);
      }
      prevQueueCount = count;
    });

  }).catch((err)=>{
    console.error('Overlay auth failed:', err.message);
  });
</script>
</body>
</html>
