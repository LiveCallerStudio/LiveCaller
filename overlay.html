<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<title>Live Caller Studio — OBS Overlay</title>
<style>
  :root{ --green:#53FC18; --red:#ff3b3b; }
  html,body{
    margin:0;padding:0;background:transparent;overflow:hidden;
    width:1920px;height:1080px;
    font-family:'Arial Black','Helvetica Neue',Arial,sans-serif;
  }

  /* Lower Third */
  .lt{
    position:fixed;left:40px;bottom:50px;
    display:flex;align-items:center;
    transform:translateX(-130%);opacity:0;
    transition:transform .55s cubic-bezier(.2,.9,.25,1),opacity .35s ease;
    z-index:10;
  }
  .lt.show{transform:translateX(0);opacity:1;}

  .badge{
    width:68px;height:68px;border-radius:50%;flex-shrink:0;
    background:radial-gradient(circle at 35% 30%,#1c1c1c,#0a0a0a);
    border:3px solid var(--green);
    box-shadow:0 0 28px rgba(83,252,24,.55);
    display:flex;align-items:center;justify-content:center;
    color:var(--green);position:relative;z-index:2;
  }
  .badge svg{width:30px;height:30px;}
  .badge .pulse{
    position:absolute;inset:-10px;border-radius:50%;
    border:2px solid var(--green);opacity:0;
    animation:micpulse 1.6s ease-out infinite;
  }
  @keyframes micpulse{0%{transform:scale(.85);opacity:.7;}100%{transform:scale(1.55);opacity:0;}}

  .text{
    background:linear-gradient(90deg,rgba(10,10,10,.96),rgba(10,10,10,.82) 80%,transparent);
    border-top:2px solid var(--green);border-bottom:2px solid var(--green);
    padding:10px 42px 10px 26px;margin-left:-14px;z-index:1;
  }
  .tag{color:var(--green);font-size:12px;letter-spacing:2.5px;text-transform:uppercase;font-weight:900;margin-bottom:2px;}
  .name{color:#fff;font-size:26px;font-weight:900;letter-spacing:.5px;text-shadow:0 0 16px rgba(0,0,0,.9);}
  .city{color:#b8b8b8;font-size:13px;font-weight:400;font-family:Arial,sans-serif;margin-top:2px;}
  .type{font-size:11px;color:var(--green);letter-spacing:1px;text-transform:uppercase;margin-top:3px;font-family:Arial,sans-serif;font-weight:700;}

  /* Live call = red */
  .lt.call .badge{border-color:var(--red);box-shadow:0 0 28px rgba(255,59,59,.55);color:var(--red);}
  .lt.call .text{border-top-color:var(--red);border-bottom-color:var(--red);}
  .lt.call .tag,.lt.call .type{color:var(--red);}
  .lt.call .pulse{border-color:var(--red);}

  /* Incoming notification */
  .notif{
    position:fixed;top:40px;right:40px;
    display:flex;align-items:center;gap:14px;
    background:rgba(10,10,10,.94);border:2px solid var(--green);
    border-radius:16px;padding:14px 20px;
    box-shadow:0 0 40px rgba(83,252,24,.3);
    transform:translateY(-140%);opacity:0;
    transition:transform .45s cubic-bezier(.2,.9,.25,1),opacity .3s ease;
    z-index:10;
  }
  .notif.show{transform:translateY(0);opacity:1;}
  .ring{
    width:52px;height:52px;border-radius:50%;border:2px solid var(--green);
    display:flex;align-items:center;justify-content:center;color:var(--green);
    animation:rp 1s ease-in-out infinite;
  }
  @keyframes rp{0%,100%{box-shadow:0 0 0 0 rgba(83,252,24,.5);}50%{box-shadow:0 0 0 10px rgba(83,252,24,0);}}
  .ring svg{width:24px;height:24px;}
  .nlabel{font-size:11px;color:var(--green);letter-spacing:2px;text-transform:uppercase;font-weight:900;}
  .ncount{font-size:22px;font-weight:900;color:#fff;}
  .nsub{font-size:12px;color:#888;font-family:Arial,sans-serif;}

  /* Queue counter — stacked under the lines badge (top-left) so it never
     collides with the video guest box, which owns the bottom-right corner */
  .qbadge{
    position:fixed;top:104px;left:40px;
    display:flex;align-items:center;gap:10px;
    background:rgba(10,10,10,.88);border:1px solid rgba(83,252,24,.4);
    border-radius:12px;padding:10px 16px;
    opacity:0;transform:scale(.85);
    transition:opacity .3s ease,transform .3s ease;
    z-index:10;
  }
  .qbadge.show{opacity:1;transform:scale(1);}
  .qdot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:blink 1.4s infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
  .qnum{font-size:20px;font-weight:900;color:var(--green);}
  .qlbl{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;font-family:Arial,sans-serif;font-weight:700;}

  /* Phone lines status (matches the queue badge's design language) */
  .linesbadge{
    position:fixed;top:40px;left:40px;
    display:flex;align-items:center;gap:10px;
    background:rgba(10,10,10,.88);border:1px solid rgba(83,252,24,.4);
    border-radius:12px;padding:10px 16px;
    opacity:0;transform:scale(.85);
    transition:opacity .3s ease,transform .3s ease,border-color .3s ease;
    z-index:10;
  }
  .linesbadge.show{opacity:1;transform:scale(1);}
  .linesbadge.closed{border-color:rgba(255,255,255,.15);}
  .linesdot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:blink 1.4s infinite;}
  .linesbadge.closed .linesdot{background:#666;animation:none;}
  .lineslbl{font-size:13px;font-weight:900;color:var(--green);text-transform:uppercase;letter-spacing:1px;}
  .linesbadge.closed .lineslbl{color:#888;}

  /* Video Guest box — the guest's camera connects directly here, no producer relay */
  .guestbox{
    position:fixed;bottom:60px;right:60px;
    width:480px;height:360px;
    border-radius:20px;overflow:hidden;
    border:3px solid var(--green);
    box-shadow:0 0 50px rgba(83,252,24,.4),0 10px 40px rgba(0,0,0,.6);
    background:#050505;
    opacity:0;transform:scale(.92) translateY(20px);
    transition:opacity .5s ease,transform .5s cubic-bezier(.2,.9,.25,1);
    z-index:9;
  }
  .guestbox.show{opacity:1;transform:scale(1) translateY(0);}
  .guestbox video{width:100%;height:100%;object-fit:cover;}
  .guestbox-label{
    position:absolute;left:16px;bottom:16px;
    display:flex;align-items:center;gap:8px;
    background:rgba(10,10,10,.8);border:1px solid rgba(83,252,24,.5);
    border-radius:20px;padding:7px 16px;
    font-size:15px;font-weight:900;color:#fff;
    text-shadow:0 0 10px rgba(0,0,0,.8);
  }
  .guestbox-label .dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:blink 1s infinite;flex-shrink:0;}
  .guestbox-tag{
    position:absolute;top:16px;left:16px;
    background:var(--red);color:#fff;font-size:11px;font-weight:900;
    letter-spacing:1.5px;text-transform:uppercase;
    padding:5px 12px;border-radius:6px;
  }
</style>
</head>
<body>

<!-- Video Guest — WebRTC connects straight from the guest's browser to this page -->
<div class="guestbox" id="guestbox">
  <video id="guestVideo" autoplay playsinline></video>
  <div class="guestbox-tag">🔴 On Air</div>
  <div class="guestbox-label"><span class="dot"></span><span id="guestName">Guest</span></div>
</div>

<!-- Phone Lines Status -->
<div class="linesbadge" id="linesbadge">
  <div class="linesdot"></div>
  <div class="lineslbl" id="linesbadgeLabel">Lines Open</div>
</div>

<!-- Lower Third -->
<div class="lt" id="lt">
  <div class="badge">
    <div class="pulse"></div>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
  </div>
  <div class="text">
    <div class="tag" id="tag">⚡ LIVE CALLER</div>
    <div class="name" id="name">—</div>
    <div class="city" id="city"></div>
    <div class="type" id="type"></div>
  </div>
</div>

<!-- Incoming Notification -->
<div class="notif" id="notif">
  <div class="ring">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.68 12 19.79 19.79 0 0 1 1.61 3.5 2 2 0 0 1 3.6 1.32h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6.13 6.13l.96-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
    </svg>
  </div>
  <div>
    <div class="nlabel">Incoming Message</div>
    <div class="ncount" id="ncount">1 waiting</div>
    <div class="nsub">Live Caller Studio</div>
  </div>
</div>

<!-- Queue Badge -->
<div class="qbadge" id="qbadge">
  <div class="qdot"></div>
  <div class="qnum" id="qnum">0</div>
  <div class="qlbl">Waiting</div>
</div>

<!-- Audio element — plays voice message and live call audio through OBS -->
<audio id="audio" autoplay playsinline style="display:none;"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import {
  getFirestore, doc, collection, query, orderBy, onSnapshot, addDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

// No auth needed — hotlineLive and hotlineMessages are public-read in Firestore rules
const app = initializeApp({
  apiKey:            "AIzaSyDNVCh-ayI5GzeboqKbQoFI5vsfSF8IaCc",
  authDomain:        "djdeeze-hotline.firebaseapp.com",
  projectId:         "djdeeze-hotline",
  storageBucket:     "djdeeze-hotline.firebasestorage.app",
  messagingSenderId: "663942225296",
  appId:             "1:663942225296:web:c6117cf6c23656b9842715"
});
const db = getFirestore(app);

const ltEl    = document.getElementById('lt');
const tagEl   = document.getElementById('tag');
const nameEl  = document.getElementById('name');
const cityEl  = document.getElementById('city');
const typeEl  = document.getElementById('type');
const notif   = document.getElementById('notif');
const ncountEl= document.getElementById('ncount');
const qbadge  = document.getElementById('qbadge');
const qnumEl  = document.getElementById('qnum');
const linesbadge = document.getElementById('linesbadge');
const linesbadgeLabel = document.getElementById('linesbadgeLabel');
const guestbox = document.getElementById('guestbox');
const guestVideo = document.getElementById('guestVideo');
const guestName = document.getElementById('guestName');
const audio   = document.getElementById('audio');

let lastUrl = null;
let notifTimer = null;
let prevCount = 0;

const typeMap = {
  general:'🎙️ Voice Message', song:'🎵 Song Request',
  shoutout:'📢 Shout-Out', birthday:'🎂 Birthday',
  dedication:'💌 Dedication', livecall:'🔴 Live Call'
};

function playAudio(url) {
  if(!url || url === lastUrl) return;
  lastUrl = url;
  audio.pause();
  audio.src = url;
  // Muted-then-unmute is the OBS CEF autoplay bypass
  audio.muted = true;
  const p = audio.play();
  if(p) p.then(() => { audio.muted = false; }).catch(() => {
    audio.muted = false;
    audio.play().catch(()=>{});
  });
}

// ── Live state listener — no auth required ──
onSnapshot(doc(db, 'hotlineLive', 'nowPlaying'), (snap) => {
  const d = snap.data();

  if(d && d.active) {
    const isCall = d.messageType === 'livecall';

    nameEl.textContent = d.name || 'Live Caller';
    cityEl.textContent = d.city || '';

    if(isCall) {
      ltEl.classList.add('call');
      tagEl.textContent = '🔴 LIVE CALL';
      typeEl.textContent = 'On Air';
    } else {
      ltEl.classList.remove('call');
      tagEl.textContent = '⚡ LIVE CALLER';
      typeEl.textContent = typeMap[d.messageType] || '';
    }

    // Play audio for BOTH voice messages and live calls
    // Voice messages: Cloudinary URL stored in Firestore
    // Live calls: audioUrl set by dashboard when Send Call On Air is pressed
    if(d.audioUrl) playAudio(d.audioUrl);

    ltEl.classList.add('show');

  } else {
    ltEl.classList.remove('show');
    ltEl.classList.remove('call');
    audio.pause();
    audio.src = '';
    lastUrl = null;
  }
});

// ── Queue counter — no auth required ──
onSnapshot(
  query(collection(db, 'hotlineMessages'), orderBy('createdAt', 'desc')),
  (snap) => {
    const count = snap.docs.filter(d => d.data().status === 'pending').length;
    qnumEl.textContent = count;
    count > 0 ? qbadge.classList.add('show') : qbadge.classList.remove('show');

    if(count > prevCount) {
      ncountEl.textContent = `${count} waiting`;
      notif.classList.add('show');
      clearTimeout(notifTimer);
      notifTimer = setTimeout(() => notif.classList.remove('show'), 4500);
    }
    prevCount = count;
  }
);

// ── Phone lines open/closed — set by the producer in the dashboard ──
onSnapshot(doc(db, 'hotlineSettings', 'callLines'), (snap) => {
  const d = snap.data();
  const open = d ? d.open !== false : true;
  linesbadge.classList.toggle('closed', !open);
  linesbadgeLabel.textContent = open ? 'Lines Open' : 'Lines Closed';
  linesbadge.classList.add('show');
});

// ═══════════════════════════════════════════════════════
//  VIDEO GUEST — WebRTC straight from the guest's browser to THIS overlay page.
//  The producer's dashboard only flips the Firestore status to 'live'/'ended' —
//  it never joins the call itself, so the guest's camera/mic reach air with
//  zero producer relay in the media path.
// ═══════════════════════════════════════════════════════
const videoIceConfig = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
  ],
  iceCandidatePoolSize: 10
};

let guestPc = null;
let connectedCallId = null;
let guestCandidateUnsub = null;

function teardownGuest(){
  if(guestCandidateUnsub){ guestCandidateUnsub(); guestCandidateUnsub = null; }
  if(guestPc){ guestPc.close(); guestPc = null; }
  guestVideo.srcObject = null;
  guestbox.classList.remove('show');
  connectedCallId = null;
}

async function connectToGuest(callId, data){
  connectedCallId = callId;
  guestName.textContent = data.callerName || 'Guest';

  guestPc = new RTCPeerConnection(videoIceConfig);

  guestPc.ontrack = (event) => {
    if(event.streams && event.streams[0]){
      guestVideo.srcObject = event.streams[0];
      guestVideo.play().catch(()=>{});
      guestbox.classList.add('show');
    }
  };

  const callDocRef = doc(db, 'videoCalls', callId);

  guestPc.onicecandidate = (event) => {
    if(event.candidate){
      addDoc(collection(db, 'videoCalls', callId, 'overlayCandidates'), event.candidate.toJSON()).catch(()=>{});
    }
  };

  await guestPc.setRemoteDescription(new RTCSessionDescription(data.offer));
  const answer = await guestPc.createAnswer();
  await guestPc.setLocalDescription(answer);

  await setDoc(callDocRef, { answer: { type: answer.type, sdp: answer.sdp } }, { merge: true });

  guestCandidateUnsub = onSnapshot(
    collection(db, 'videoCalls', callId, 'callerCandidates'),
    (snap) => {
      snap.docChanges().forEach(async(change) => {
        if(change.type === 'added' && guestPc){
          await guestPc.addIceCandidate(new RTCIceCandidate(change.doc.data())).catch(()=>{});
        }
      });
    }
  );
}

// Watch for whichever video call the producer has set to 'live'
onSnapshot(
  query(collection(db, 'videoCalls'), orderBy('createdAt', 'desc')),
  (snap) => {
    const liveCall = snap.docs.map(d => ({ id: d.id, ...d.data() })).find(c => c.status === 'live');

    if(!liveCall){
      if(connectedCallId) teardownGuest();
      return;
    }

    if(liveCall.id === connectedCallId) return; // already connected to this one

    // A different (or first) call just went live — tear down any previous connection first
    teardownGuest();
    if(liveCall.offer) connectToGuest(liveCall.id, liveCall);
  }
);
</script>
</body>
</html>
