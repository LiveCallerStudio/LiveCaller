<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#53FC18">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Live Caller Studio — Call In Live</title>
<style>
  :root{
    --green:#53FC18;
    --green-dim:#3adb00;
    --red:#ff3b3b;
    --black:#000;
    --panel:#0e0e0e;
    --panel2:#141414;
    --line:#1e1e1e;
    --text:#fff;
    --sub:#888;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{
    min-height:100vh;
    background:var(--black);
    color:var(--text);
    font-family:'Arial Black','Helvetica Neue',Arial,sans-serif;
    overflow-x:hidden;
  }

  /* ── Lightning bolt decorations (matches voicemessage.html) ── */
  .bolt-wrap{
    position:fixed;top:0;left:0;right:0;bottom:0;
    pointer-events:none;z-index:0;overflow:hidden;
  }
  .bolt-tl,.bolt-tr{
    position:absolute;top:-20px;
    font-size:120px;line-height:1;
    color:var(--green);opacity:.18;
    filter:drop-shadow(0 0 20px rgba(83,252,24,0.6));
    animation:boltpulse 3s ease-in-out infinite;
  }
  .bolt-tl{left:-20px;transform:rotate(-15deg);}
  .bolt-tr{right:-20px;transform:rotate(15deg);animation-delay:1.5s;}
  @keyframes boltpulse{0%,100%{opacity:.18;}50%{opacity:.28;}}

  /* ── Ambient glow ── */
  .ambient{
    position:fixed;top:0;left:0;right:0;height:50vh;
    pointer-events:none;z-index:0;
    background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(83,252,24,0.12) 0%, transparent 70%);
  }

  .page{
    position:relative;z-index:1;
    min-height:100vh;
    display:flex;flex-direction:column;align-items:center;
    padding:0 20px 50px;
  }

  /* ── Site header (matches voicemessage.html) ── */
  .site-header{
    width:100%;max-width:500px;
    text-align:center;
    padding:28px 0 0;
    margin-bottom:6px;
  }
  .site-brand{
    font-size:13px;letter-spacing:3px;font-weight:900;
    text-transform:uppercase;color:#555;
    display:flex;align-items:center;justify-content:center;gap:8px;
    margin-bottom:4px;
  }
  .site-brand span{color:var(--green);}

  .wrap{ position:relative; z-index:1; width:100%; max-width:500px; display:flex; flex-direction:column; align-items:center; }

  /* Setup screen */
  #setupScreen{ width:100%; display:flex; flex-direction:column; align-items:center; }
  .setup-hero{text-align:center;margin-bottom:28px;padding-top:16px;}
  .setup-hero h1{
    font-size:clamp(28px,7vw,42px);
    text-transform:uppercase;
    letter-spacing:-0.5px;
    line-height:1.05;
    margin-bottom:10px;
    text-shadow:0 0 40px rgba(83,252,24,0.2);
  }
  .setup-hero .sub-dots{
    font-family:Arial,sans-serif;font-size:11.5px;
    color:#555;letter-spacing:2px;text-transform:uppercase;
    margin-bottom:8px;
  }
  .setup-hero .tagline{
    font-family:Arial,sans-serif;font-style:italic;
    font-size:15px;color:var(--green);font-weight:700;
    text-shadow:0 0 14px rgba(83,252,24,0.6);
  }

  .field{ margin-bottom:18px; width:100%; }
  .field label{ display:block; font-family:Arial,sans-serif; font-size:11px; color:#555; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
  .field input{ width:100%; background:#0a0a0a; border:1.5px solid #1e1e1e; border-radius:10px; padding:14px; color:var(--text); font-family:Arial,sans-serif; font-size:14px; }
  .field input:focus{ outline:none; border-color:rgba(83,252,24,0.4); }

  .disclaimer{
    font-family:Arial,sans-serif;font-size:12.5px;color:#666;
    text-align:center;line-height:1.5;margin:4px 0 18px;
  }

  .call-btn{
    width:100%;padding:17px;border-radius:12px;border:none;
    background:var(--green);color:#000;
    font-size:15px;font-weight:900;text-transform:uppercase;letter-spacing:1px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:10px;
    box-shadow:0 0 32px rgba(83,252,24,0.35),0 4px 16px rgba(0,0,0,0.5);
    transition:filter .15s,transform .15s;
  }
  .call-btn:hover{ filter:brightness(1.1); transform:translateY(-2px); }
  .call-btn:active{ transform:scale(.98); }
  .call-btn:disabled{ opacity:.4; cursor:not-allowed; }

  /* Call screen */
  #callScreen{ display:none; width:100%; text-align:center; flex-direction:column; align-items:center; }

  .call-visual{
    width:140px; height:140px; border-radius:50%; margin:0 auto 20px;
    border:3px solid var(--green);
    box-shadow:0 0 40px rgba(83,252,24,0.3);
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }
  .call-visual.ringing{ border-color:var(--green); animation:ringpulse 1.2s ease-in-out infinite; }
  .call-visual.connected{ border-color:var(--green); }
  .call-visual.held{ border-color:#f5a623; box-shadow:0 0 40px rgba(245,166,35,0.3); }
  .call-visual.ended{ border-color:var(--red); box-shadow:0 0 40px rgba(255,59,59,0.3); }
  @keyframes ringpulse{
    0%,100%{ box-shadow:0 0 0 0 rgba(83,252,24,0.5), 0 0 40px rgba(83,252,24,0.3); }
    50%{ box-shadow:0 0 0 20px rgba(83,252,24,0), 0 0 40px rgba(83,252,24,0.3); }
  }
  .call-visual svg{ width:60px; height:60px; color:var(--green); }
  .call-visual.held svg{ color:#f5a623; }
  .call-visual.ended svg{ color:var(--red); }

  .call-status{ font-size:22px; font-weight:900; margin:0 0 6px; }
  .call-timer{ font-size:32px; font-weight:900; color:var(--green); font-variant-numeric:tabular-nums; letter-spacing:2px; min-height:40px; margin-bottom:6px; }
  .call-sub{ font-family:Arial,sans-serif; color:var(--sub); font-size:13px; margin-bottom:28px; }

  .call-controls{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; width:100%; }
  .ctrl-btn{
    flex:1; min-width:100px; padding:16px 10px; border-radius:11px; border:none; cursor:pointer;
    font-family:Arial,sans-serif; font-weight:900; font-size:13px; text-transform:uppercase;
    letter-spacing:1.5px; transition:filter .15s ease, transform .12s ease;
  }
  .ctrl-btn:active{ transform:scale(.98); }
  .ctrl-btn.mute{ background:transparent; color:var(--text); border:1.5px solid #1e1e1e; }
  .ctrl-btn.mute:hover{ border-color:#333; }
  .ctrl-btn.mute.active{ background:rgba(255,59,59,0.15); border-color:var(--red); color:var(--red); }
  .ctrl-btn.endcall{ background:var(--red); color:#fff; box-shadow:0 4px 14px rgba(255,59,59,0.3); }
  .ctrl-btn.endcall:hover{ filter:brightness(1.08); }
  .ctrl-btn:disabled{ opacity:.4; cursor:not-allowed; }

  .status-badge{
    display:inline-flex; align-items:center; gap:6px;
    padding:6px 14px; border-radius:20px; font-size:12px;
    font-family:Arial,sans-serif; font-weight:700; letter-spacing:1px;
    text-transform:uppercase; margin-bottom:16px;
  }
  .status-badge.waiting{ background:rgba(83,252,24,0.12); color:var(--green); border:1px solid rgba(83,252,24,0.3); }
  .status-badge.connected{ background:rgba(83,252,24,0.2); color:var(--green); border:1px solid var(--green); }
  .status-badge.held{ background:rgba(245,166,35,0.15); color:#f5a623; border:1px solid rgba(245,166,35,0.4); }
  .status-badge.ended{ background:rgba(255,59,59,0.12); color:var(--red); border:1px solid rgba(255,59,59,0.3); }
  .status-dot{ width:7px; height:7px; border-radius:50%; background:currentColor; animation:blink 1.4s infinite; }
  .status-badge.connected .status-dot{ animation:blink 1.4s infinite; }
  .status-badge.ended .status-dot{ animation:none; }
  @keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:.2;} }

  .error-banner{
    display:none; background:rgba(255,59,59,0.1); border:1px solid var(--red); color:#ff8a8a;
    font-family:Arial,sans-serif; font-size:12.5px; padding:12px 14px; border-radius:10px;
    margin-bottom:14px; width:100%; line-height:1.4;
  }
  .error-banner.show{ display:block; }

  /* ── Footer ── */
  .site-footer{
    margin-top:36px;
    font-family:Arial,sans-serif;font-size:10.5px;
    color:#2a2a2a;letter-spacing:2px;text-transform:uppercase;
    display:flex;align-items:center;gap:7px;
  }
  .site-footer span{color:var(--green);font-size:13px;}

  @media(max-width:380px){
    .call-visual{ width:120px; height:120px; }
    .call-timer{ font-size:26px; }
  }
</style>
</head>
<body>

<div class="bolt-wrap">
  <div class="bolt-tl">⚡</div>
  <div class="bolt-tr">⚡</div>
</div>
<div class="ambient"></div>

<div class="page">

  <!-- Site Header -->
  <div class="site-header">
    <div class="site-brand">
      <span>⚡</span>
      LIVE <span>CALLER</span>
    </div>
  </div>

  <div class="wrap">

    <!-- Setup Screen -->
    <div id="setupScreen">
      <div class="setup-hero">
        <h1>CALL IN<br>LIVE</h1>
        <p class="sub-dots">TWO-WAY AUDIO • SCREENED • ON AIR</p>

      <button class="call-btn" id="callBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.68 12 19.79 19.79 0 0 1 1.61 3.5 2 2 0 0 1 3.6 1.32h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6.13 6.13l.96-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        Call In Live

    <!-- Call Screen -->
    <div id="callScreen">
      <div class="call-visual" id="callVisual">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.68 12 19.79 19.79 0 0 1 1.61 3.5 2 2 0 0 1 3.6 1.32h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6.13 6.13l.96-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
      </div>

      <div class="status-badge waiting" id="statusBadge"><span class="status-dot"></span><span id="statusText">Waiting</span></div>
      <div class="call-status" id="callerNameDisplay">—</div>

  </div>

  <!-- Footer -->
  <div class="site-footer">
    <span>⚡</span> POWERED BY LIVE CALLER
  </div>

<audio id="remoteAudio" autoplay playsinline style="display:none;"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import {
  getFirestore, collection, doc, addDoc, updateDoc,
  onSnapshot, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyDNVCh-ayI5GzeboqKbQoFI5vsfSF8IaCc",
  authDomain:        "djdeeze-hotline.firebaseapp.com",
  projectId:         "djdeeze-hotline",
  storageBucket:     "djdeeze-hotline.firebasestorage.app",
  messagingSenderId: "663942225296",
  appId:             "1:663942225296:web:c6117cf6c23656b9842715"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ICE config — STUN for direct connections + TURN relay for cross-network/NAT traversal
// Open Relay Project (openrelay.metered.ca) is free with no account required
const STUN = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    {
      urls: 'turn:openrelay.metered.ca:80',
      username: 'openrelayproject',
      credential: 'openrelayproject'
    },
    {
      urls: 'turn:openrelay.metered.ca:443',
      username: 'openrelayproject',
      credential: 'openrelayproject'
    },
    {
      urls: 'turn:openrelay.metered.ca:443?transport=tcp',
      username: 'openrelayproject',
      credential: 'openrelayproject'
    }
  ],
  iceCandidatePoolSize: 10
};

let pc = null;
let localStream = null;
let callDocRef = null;
let timerInterval = null;
let callSeconds = 0;
let micMuted = false;

// ── Outgoing ring tone (caller hears this while waiting for answer) ──
let outgoingRingInterval = null;
function startOutgoingRing(){
  stopOutgoingRing();
  function ring(){
    try{
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const gain = ctx.createGain();
      gain.connect(ctx.destination);
      // Single clear tone - standard mobile outgoing ring pattern
      [440].forEach(freq=>{
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = freq;
        osc.connect(gain);
        gain.gain.setValueAtTime(0.25, ctx.currentTime);
        gain.gain.setValueAtTime(0.25, ctx.currentTime + 0.5);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.65);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.65);
      });
      setTimeout(()=> ctx.close().catch(()=>{}), 1000);
    }catch(e){}
  }
  ring();
  // Ring twice rapidly (brring brring) then pause
  setTimeout(ring, 700);
  outgoingRingInterval = setInterval(()=>{ ring(); setTimeout(ring, 700); }, 3500);
}
function stopOutgoingRing(){
  clearInterval(outgoingRingInterval);
  outgoingRingInterval = null;
}

// ── Hold music (plays in caller's browser when producer puts them on hold) ──
let holdMusicCtx = null;
let holdMusicTimeout = null;
function startHoldMusicCaller(){
  stopHoldMusicCaller();
  holdMusicCtx = new (window.AudioContext || window.webkitAudioContext)();
  const notes = [261.63,329.63,392.00,523.25,392.00,329.63,261.63,0,0,0];
  let idx = 0;
  function tick(){
    if(!holdMusicCtx) return;
    const freq = notes[idx % notes.length];
    if(freq){
      const osc = holdMusicCtx.createOscillator();
      const env = holdMusicCtx.createGain();
      osc.type = 'sine'; osc.frequency.value = freq;
      osc.connect(env); env.connect(holdMusicCtx.destination);
      env.gain.setValueAtTime(0, holdMusicCtx.currentTime);
      env.gain.linearRampToValueAtTime(0.15, holdMusicCtx.currentTime + 0.04);
      env.gain.exponentialRampToValueAtTime(0.001, holdMusicCtx.currentTime + 0.45);
      osc.start(); osc.stop(holdMusicCtx.currentTime + 0.45);
    }
    idx++;
    holdMusicTimeout = setTimeout(tick, 480);
  }
  tick();
}
function stopHoldMusicCaller(){
  clearTimeout(holdMusicTimeout);
  holdMusicTimeout = null;
  if(holdMusicCtx){ holdMusicCtx.close().catch(()=>{}); holdMusicCtx = null; }
}

const setupScreen      = document.getElementById('setupScreen');
const callScreen       = document.getElementById('callScreen');
const callBtn          = document.getElementById('callBtn');
const callerNameInput  = document.getElementById('callerName');
const callerCityInput  = document.getElementById('callerCity');
const callVisual       = document.getElementById('callVisual');
const statusBadge      = document.getElementById('statusBadge');
const statusText       = document.getElementById('statusText');
const callerNameDisplay= document.getElementById('callerNameDisplay');
const callTimer        = document.getElementById('callTimer');
const callSub          = document.getElementById('callSub');
const muteBtn          = document.getElementById('muteBtn');
const endBtn           = document.getElementById('endBtn');
const remoteAudio      = document.getElementById('remoteAudio');
const errorBanner      = document.getElementById('errorBanner');

function showError(msg){ errorBanner.textContent = msg; errorBanner.classList.add('show'); }
function clearError(){ errorBanner.classList.remove('show'); }

function formatTimer(s){
  const m = Math.floor(s/60);
  return `${m}:${(s%60).toString().padStart(2,'0')}`;
}

function setStatus(state, sub){
  statusBadge.className = 'status-badge ' + state;
  statusText.textContent = { waiting:'Waiting', connected:'Connected', held:'On Hold', ended:'Call Ended' }[state] || state;
  callVisual.className = 'call-visual ' + state;
  callSub.textContent = sub || '';
}

function startTimer(){
  callSeconds = 0;
  timerInterval = setInterval(()=>{ callSeconds++; callTimer.textContent = formatTimer(callSeconds); }, 1000);
}

function stopTimer(){ clearInterval(timerInterval); }

async function startCall(){
  clearError();
  const name = callerNameInput.value.trim();
  if(!name){ showError('Please enter your name before calling in.'); return; }

  callBtn.disabled = true;
  callBtn.textContent = 'Connecting…';

  try{
    localStream = await navigator.mediaDevices.getUserMedia({
      audio:{ echoCancellation:true, noiseSuppression:true, sampleRate:48000 }
    });
  }catch(err){
    showError('Microphone access is required to call in. Please allow microphone access and try again.');
    callBtn.disabled = false;
    callBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.68 12 19.79 19.79 0 0 1 1.61 3.5 2 2 0 0 1 3.6 1.32h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6.13 6.13l.96-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg> Call In Live';
    return;
  }

  pc = new RTCPeerConnection(STUN);
  localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

  // Play remote audio (producer's voice)
  pc.ontrack = (event) => {
    if(event.streams && event.streams[0]){
      remoteAudio.srcObject = event.streams[0];
      remoteAudio.play().catch(()=>{});
    }
  };

  // Buffer dashboard ICE candidates that arrive before remote description is set
  const pendingCandidates = [];
  let remoteDescSet = false;

  // Create offer BEFORE setting up onicecandidate so we have the callDocRef first
  const offer = await pc.createOffer();

  // Save call to Firestore FIRST so we have the ID for ICE candidate collection path
  callDocRef = await addDoc(collection(db, 'liveCalls'), {
    callerName: name,
    callerCity: callerCityInput.value.trim() || null,
    offer: { type: offer.type, sdp: offer.sdp },
    status: 'waiting',
    createdAt: serverTimestamp()
  });

  // Wire onicecandidate BEFORE setLocalDescription so no candidates are missed
  pc.onicecandidate = (e) => {
    if(e.candidate){
      addDoc(collection(db, 'liveCalls', callDocRef.id, 'callerCandidates'), e.candidate.toJSON())
        .catch(()=>{});
    }
  };

  // Now set local description — ICE gathering starts here, handler is already wired
  await pc.setLocalDescription(offer);

  // Listen for answer + status changes
  onSnapshot(callDocRef, async (snap) => {
    const data = snap.data();
    if(!data) return;

    // Set remote description as soon as answer arrives, then drain buffered candidates
    if(data.answer && !pc.currentRemoteDescription){
      try{
        await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
        remoteDescSet = true;
        for(const c of pendingCandidates){
          await pc.addIceCandidate(c).catch(()=>{});
        }
        pendingCandidates.length = 0;
      }catch(e){ console.error('setRemoteDescription failed:', e); }
    }

    if(data.status === 'answered' || data.status === 'live'){
      stopOutgoingRing();
      stopHoldMusicCaller();
      setStatus('connected', 'Connected — you may be put on air');
      if(!timerInterval) startTimer();
    } else if(data.status === 'held'){
      stopOutgoingRing();
      setStatus('held', 'You\'re on hold — producer will be right with you');
      startHoldMusicCaller();
    } else if(data.status === 'rejected'){
      stopOutgoingRing();
      stopHoldMusicCaller();
      setStatus('ended', 'Call could not be connected right now. Try again soon!');
      stopTimer();
      cleanup(false);
      setTimeout(()=>{
        window.close();
        document.body.innerHTML = `
          <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;
            justify-content:center;background:#0a0a0a;color:#f2f2f2;font-family:Arial,sans-serif;
            text-align:center;padding:40px 20px;gap:16px;">
            <div style="font-size:48px;">📵</div>
            <div style="font-size:22px;font-weight:900;">Not Available</div>
            <div style="font-size:14px;color:#888;">The producer is unavailable right now. Try calling back soon!</div>
          </div>`;
      }, 3000);
    } else if(data.status === 'ended'){
      stopOutgoingRing();
      stopHoldMusicCaller();
      setStatus('ended', 'Call ended. Thank you for calling in!');
      stopTimer();
      cleanup(false);
      setTimeout(()=>{
        window.close();
        document.body.innerHTML = `
          <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;
            justify-content:center;background:#0a0a0a;color:#f2f2f2;font-family:Arial,sans-serif;
            text-align:center;padding:40px 20px;gap:16px;">
            <div style="font-size:48px;">📞</div>
            <div style="font-size:22px;font-weight:900;">Call Ended</div>
            <div style="font-size:14px;color:#888;">Thanks for calling in to Live Caller Studio!</div>
            <div style="font-size:12px;color:#555;margin-top:8px;">You can close this window.</div>
          </div>`;
      }, 3000);
    }
  });

  // Listen for dashboard ICE candidates — buffer them if remote desc not set yet
  onSnapshot(collection(db, 'liveCalls', callDocRef.id, 'dashboardCandidates'), (snap) => {
    snap.docChanges().forEach(async (change) => {
      if(change.type === 'added'){
        const candidate = new RTCIceCandidate(change.doc.data());
        if(remoteDescSet){
          await pc.addIceCandidate(candidate).catch(()=>{});
        } else {
          pendingCandidates.push(candidate);
        }
      }
    });
  });

  // Show call screen and start ringing
  setupScreen.style.display = 'none';
  callScreen.style.display = 'flex';
  callerNameDisplay.textContent = name;
  setStatus('waiting', 'Calling Live Caller Studio…');
  startOutgoingRing(); // Start outgoing ring while waiting
}

function cleanup(updateFirestore = true){
  if(localStream) localStream.getTracks().forEach(t => t.stop());
  if(pc){ pc.close(); pc = null; }
  if(updateFirestore && callDocRef){
    updateDoc(callDocRef, { status:'ended' }).catch(()=>{});
  }
}

muteBtn.addEventListener('click', ()=>{
  if(!localStream) return;
  micMuted = !micMuted;
  localStream.getAudioTracks().forEach(t => t.enabled = !micMuted);
  muteBtn.textContent = micMuted ? '🔇 Unmute' : '🎤 Mute';
  muteBtn.classList.toggle('active', micMuted);
});

endBtn.addEventListener('click', async ()=>{
  endBtn.disabled = true;
  stopOutgoingRing();
  stopHoldMusicCaller();
  stopTimer();
  setStatus('ended', 'Call ended. Thank you for calling in!');
  if(callDocRef) await updateDoc(callDocRef, { status:'ended' }).catch(()=>{});
  cleanup(false);
  setTimeout(()=>{
    window.close();
    document.body.innerHTML = `
      <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;
        justify-content:center;background:#0a0a0a;color:#f2f2f2;font-family:Arial,sans-serif;
        text-align:center;padding:40px 20px;gap:16px;">
        <div style="font-size:48px;">📞</div>
        <div style="font-size:22px;font-weight:900;">Call Ended</div>
        <div style="font-size:14px;color:#888;">Thanks for calling in to Live Caller Studio!</div>
        <div style="font-size:12px;color:#555;margin-top:8px;">You can close this window.</div>
      </div>`;
  }, 2000);
});

callBtn.addEventListener('click', startCall);
callerNameInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') startCall(); });

window.addEventListener('beforeunload', ()=>{ stopOutgoingRing(); stopHoldMusicCaller(); cleanup(true); });

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
