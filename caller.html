<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#53FC18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Call In Live">
<title>Live Caller Studio — Call In Live</title>
<style>
  :root{
    --green:#53FC18;
    --red:#ff3b3b;
    --black:#0a0a0a;
    --panel:#131313;
    --panel2:#1b1b1b;
    --line:#2a2a2a;
    --text:#f2f2f2;
    --sub:#9a9a9a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(circle at 50% -10%, rgba(83,252,24,0.08), transparent 55%), var(--black);
    color:var(--text); font-family:'Arial Black','Helvetica Neue',Arial,sans-serif;
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    justify-content:center; padding:40px 16px;
  }
  .wrap{width:100%; max-width:400px; display:flex; flex-direction:column; align-items:center;}

  /* Brand */
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .brand-bolt{color:var(--green);font-size:20px;}
  .brand-name{font-size:16px;letter-spacing:2px;font-weight:900;text-transform:uppercase;}
  .brand-name span{color:var(--green);}
  .brand-tag{font-family:Arial,sans-serif;font-size:11px;color:var(--sub);letter-spacing:1.5px;
    text-transform:uppercase;margin-bottom:32px;}

  /* Call button */
  .call-stage{position:relative;width:180px;height:180px;display:flex;align-items:center;
    justify-content:center;margin-bottom:12px;}
  .ring{position:absolute;border-radius:50%;border:2px solid var(--green);opacity:0;pointer-events:none;}
  .calling .ring{animation:ripple 1.8s ease-out infinite;}
  .calling .ring:nth-child(2){animation-delay:.6s!important;}
  .calling .ring:nth-child(3){animation-delay:1.2s!important;}
  @keyframes ripple{
    0%{width:120px;height:120px;opacity:.6;}
    100%{width:200px;height:200px;opacity:0;}
  }
  .call-btn{
    position:relative;z-index:2;width:120px;height:120px;border-radius:50%;
    border:3px solid var(--green);background:linear-gradient(160deg,var(--panel2),#0e0e0e);
    box-shadow:0 0 30px rgba(83,252,24,0.2),inset 0 0 20px rgba(0,0,0,.6);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    color:var(--green);transition:transform .15s ease,box-shadow .15s ease;
  }
  .call-btn:active{transform:scale(.95);}
  .call-btn:disabled{opacity:.4;cursor:not-allowed;}
  .call-btn.calling{border-color:var(--green);color:var(--green);}
  .call-btn.connected{border-color:#00c896;color:#00c896;box-shadow:0 0 30px rgba(0,200,150,.3);}
  .call-btn.on-hold{border-color:#f5a623;color:#f5a623;}
  .call-btn svg{width:46px;height:46px;}

  .call-status{
    font-family:Arial,sans-serif;font-size:13px;color:var(--sub);letter-spacing:1.5px;
    text-transform:uppercase;margin-bottom:6px;min-height:18px;text-align:center;
  }
  .call-timer{
    font-size:32px;font-weight:900;color:var(--text);font-variant-numeric:tabular-nums;
    min-height:40px;margin-bottom:24px;
  }

  /* Form */
  .call-form{width:100%;display:flex;flex-direction:column;gap:12px;margin-bottom:20px;}
  .field label{display:block;font-family:Arial,sans-serif;font-size:11px;color:var(--sub);
    text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
  .field input{
    width:100%;background:var(--black);border:1px solid var(--line);border-radius:8px;
    padding:12px;color:var(--text);font-family:Arial,sans-serif;font-size:14px;
  }
  .field input:focus{outline:none;border-color:var(--green);}

  .mic-status{
    display:flex;align-items:center;gap:8px;font-family:Arial,sans-serif;font-size:12px;
    color:var(--sub);margin-bottom:16px;
  }
  .mic-dot{width:8px;height:8px;border-radius:50%;background:#555;}
  .mic-dot.ok{background:var(--green);}
  .mic-dot.err{background:var(--red);}

  /* Buttons */
  .btn{
    width:100%;padding:13px;border-radius:8px;border:none;cursor:pointer;
    font-family:Arial,sans-serif;font-weight:700;font-size:13px;letter-spacing:.5px;
    text-transform:uppercase;transition:filter .15s ease;
  }
  .btn:active{transform:scale(.97);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn-green{background:var(--green);color:#0a0a0a;}
  .btn-green:hover{filter:brightness(1.1);}
  .btn-red{background:var(--red);color:#fff;}
  .btn-red:hover{filter:brightness(1.1);}
  .btn-ghost{background:transparent;color:var(--sub);border:1px solid var(--line);}

  .in-call-actions{display:flex;flex-direction:column;gap:10px;width:100%;}

  /* Hold indicator */
  .hold-banner{
    display:none;background:rgba(245,166,35,.1);border:1px solid #f5a623;
    color:#f5a623;font-family:Arial,sans-serif;font-size:13px;font-weight:700;
    padding:10px;border-radius:8px;text-align:center;margin-bottom:10px;
  }
  .hold-banner.show{display:block;}

  /* Error */
  .error{
    display:none;background:rgba(255,59,59,.1);border:1px solid var(--red);
    color:#ff8a8a;font-family:Arial,sans-serif;font-size:13px;padding:12px;
    border-radius:8px;margin-bottom:16px;text-align:center;
  }
  .error.show{display:block;}

  /* Ended screen */
  .ended-screen{display:none;text-align:center;}
  .ended-screen.show{display:block;}
  .ended-screen .icon{font-size:48px;margin-bottom:16px;}
  .ended-screen h2{margin:0 0 8px;font-size:20px;}
  .ended-screen p{font-family:Arial,sans-serif;color:var(--sub);font-size:13px;margin:0 0 20px;}

  .footnote{
    margin-top:28px;font-family:Arial,sans-serif;color:#5a5a5a;font-size:11px;text-align:center;
  }

  @media(max-width:380px){
    .call-stage{width:160px;height:160px;}
    .call-btn{width:104px;height:104px;}
    .call-btn svg{width:40px;height:40px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <span class="brand-bolt">⚡</span>
    <span class="brand-name">LIVE <span>CALLER</span> STUDIO</span>
  </div>
  <div class="brand-tag">Live Call-In</div>

  <div class="error" id="errorBanner"></div>

  <!-- PRE-CALL FORM -->
  <div id="preCallView" style="width:100%;display:flex;flex-direction:column;align-items:center;">
    <div class="mic-status">
      <div class="mic-dot" id="micDot"></div>
      <span id="micLabel">Checking microphone…</span>
    </div>
    <div class="call-form">
      <div class="field">
        <label>Your Name <span style="color:#555;font-weight:400;text-transform:none;letter-spacing:0;">(required)</span></label>
        <input type="text" id="fName" maxlength="40" placeholder="What should we call you on air?">
      </div>
      <div class="field">
        <label>City <span style="color:#555;font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
        <input type="text" id="fCity" maxlength="40" placeholder="Where are you calling from?">
      </div>
    </div>
    <button class="btn btn-green" id="startCallBtn" disabled>📞 Call In Live</button>
  </div>

  <!-- IN-CALL VIEW -->
  <div id="inCallView" style="display:none;width:100%;display:none;flex-direction:column;align-items:center;">
    <div class="call-stage" id="callStage">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="call-btn" id="callBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.68 12 19.79 19.79 0 0 1 1.61 3.5 2 2 0 0 1 3.6 1.32h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6.13 6.13l.96-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
      </div>
    </div>
    <div class="call-status" id="callStatus">Calling…</div>
    <div class="call-timer" id="callTimer"></div>
    <div class="hold-banner" id="holdBanner">⏸ You are on hold</div>
    <div class="in-call-actions" id="inCallActions" style="display:none;">
      <button class="btn btn-red" id="endCallBtn">End Call</button>
    </div>
  </div>

  <!-- ENDED VIEW -->
  <div class="ended-screen" id="endedView">
    <div class="icon">📵</div>
    <h2>Call Ended</h2>
    <p>Thanks for calling in to Live Caller Studio.</p>
    <button class="btn btn-green" id="callAgainBtn">Call Again</button>
  </div>

  <div class="footnote">By calling in, you agree your audio may be broadcast on-air.</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import {
  getFirestore, doc, setDoc, updateDoc, addDoc, collection,
  onSnapshot, serverTimestamp, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyDNVCh-ayI5GzeboqKbQoFI5vsfSF8IaCc",
  authDomain:        "djdeeze-hotline.firebaseapp.com",
  projectId:         "djdeeze-hotline",
  storageBucket:     "djdeeze-hotline.firebasestorage.app",
  messagingSenderId: "663942225296",
  appId:             "1:663942225296:web:c6117cf6c23656b9842715"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const RTC_CONFIG = {
  iceServers:[
    {urls:'stun:stun.l.google.com:19302'},
    {urls:'stun:stun1.l.google.com:19302'},
    {urls:'stun:stun2.l.google.com:19302'},
  ]
};

// Elements
const preCallView  = document.getElementById('preCallView');
const inCallView   = document.getElementById('inCallView');
const endedView    = document.getElementById('endedView');
const callStage    = document.getElementById('callStage');
const callBtn      = document.getElementById('callBtn');
const callStatus   = document.getElementById('callStatus');
const callTimer    = document.getElementById('callTimer');
const holdBanner   = document.getElementById('holdBanner');
const inCallActions= document.getElementById('inCallActions');
const endCallBtn   = document.getElementById('endCallBtn');
const callAgainBtn = document.getElementById('callAgainBtn');
const startCallBtn = document.getElementById('startCallBtn');
const micDot       = document.getElementById('micDot');
const micLabel     = document.getElementById('micLabel');
const errorBanner  = document.getElementById('errorBanner');

let localStream = null;
let dashboardPc  = null; // caller ↔ dashboard
let overlayPc    = null; // caller ↔ overlay (when on air)
let callId       = null;
let callDocRef   = null;
let timerInterval= null;
let callStartTime= null;
let unsubCall    = null;
let unsubBroadcast = null;

function showError(msg){ errorBanner.textContent=msg; errorBanner.classList.add('show'); }
function clearError(){ errorBanner.classList.remove('show'); }

function formatTime(ms){
  const s = Math.floor(ms/1000);
  const m = Math.floor(s/60);
  return `${m}:${(s%60).toString().padStart(2,'0')}`;
}

// Request mic on page load
async function initMic(){
  try{
    localStream = await navigator.mediaDevices.getUserMedia({
      audio:{ echoCancellation:true, noiseSuppression:true, sampleRate:44100 }
    });
    micDot.className='mic-dot ok';
    micLabel.textContent='Microphone ready';
    startCallBtn.disabled = false;
  }catch(err){
    micDot.className='mic-dot err';
    micLabel.textContent='Microphone blocked — please allow access';
    showError('Microphone access is required to call in. Please allow mic permissions and refresh.');
  }
}
initMic();

startCallBtn.addEventListener('click', async ()=>{
  const name = document.getElementById('fName').value.trim();
  if(!name){ showError('Please enter your name before calling in.'); return; }
  clearError();
  startCallBtn.disabled=true;
  startCallBtn.textContent='Connecting…';
  await startCall(name, document.getElementById('fCity').value.trim());
});

async function startCall(name, city){
  callId = `call_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
  callDocRef = doc(db, 'calls', callId);

  // Create RTC peer connection for dashboard
  dashboardPc = new RTCPeerConnection(RTC_CONFIG);
  localStream.getTracks().forEach(t=> dashboardPc.addTrack(t, localStream));

  // Save caller ICE candidates
  dashboardPc.onicecandidate = async (e)=>{
    if(e.candidate){
      await addDoc(collection(callDocRef,'callerCandidates'), { candidate: e.candidate.toJSON() });
    }
  };

  dashboardPc.onconnectionstatechange = ()=>{
    const state = dashboardPc.connectionState;
    if(state==='connected'){
      callBtn.className='call-btn connected';
      callStatus.textContent='Connected';
      inCallActions.style.display='flex';
      callStartTime = Date.now();
      timerInterval = setInterval(()=>{
        callTimer.textContent = formatTime(Date.now()-callStartTime);
      },1000);
    }
    if(state==='failed' || state==='disconnected'){
      handleCallEnded();
    }
  };

  // Create offer
  const offer = await dashboardPc.createOffer();
  await dashboardPc.setLocalDescription(offer);

  // Save call to Firestore
  await setDoc(callDocRef,{
    callerName: name,
    callerCity: city || null,
    offer:{ type:offer.type, sdp:offer.sdp },
    status:'calling',
    createdAt: serverTimestamp()
  });

  // Switch to in-call UI
  preCallView.style.display='none';
  inCallView.style.display='flex';
  callStage.classList.add('calling');
  callStatus.textContent='Calling… waiting for host to answer';

  // Listen for answer from dashboard
  unsubCall = onSnapshot(callDocRef, async (snap)=>{
    const data = snap.data();
    if(!data) return;

    // Dashboard answered — set remote description
    if(data.answer && dashboardPc && !dashboardPc.remoteDescription){
      await dashboardPc.setRemoteDescription(new RTCSessionDescription(data.answer));
    }

    // Hold state
    if(data.status==='on-hold'){
      holdBanner.classList.add('show');
      callBtn.className='call-btn on-hold';
      callStatus.textContent='On hold';
    } else if(data.status==='answered'){
      holdBanner.classList.remove('show');
    }

    // Call ended by dashboard
    if(data.status==='ended'){ handleCallEnded(); }
  });

  // Listen for dashboard ICE candidates
  onSnapshot(collection(callDocRef,'dashboardCandidates'), (snap)=>{
    snap.docChanges().forEach(async change=>{
      if(change.type==='added' && dashboardPc){
        try{ await dashboardPc.addIceCandidate(new RTCIceCandidate(change.doc.data().candidate)); }
        catch(e){}
      }
    });
  });

  // Listen for "Send Live On Air" signal from dashboard
  const broadcastRef = doc(db,'liveBroadcast','currentCall');
  unsubBroadcast = onSnapshot(broadcastRef, async (snap)=>{
    const data = snap.data();
    if(!data) return;

    // Dashboard signaled THIS call to go on air
    if(data.status==='requested' && data.callId===callId && !overlayPc){
      await connectToOverlay(broadcastRef);
    }

    // Stop overlay connection if taken off air
    if(data.status==='idle' && overlayPc){
      overlayPc.close();
      overlayPc=null;
    }
  });
}

async function connectToOverlay(broadcastRef){
  overlayPc = new RTCPeerConnection(RTC_CONFIG);
  localStream.getTracks().forEach(t=> overlayPc.addTrack(t, localStream));

  overlayPc.onicecandidate = async (e)=>{
    if(e.candidate){
      await addDoc(collection(broadcastRef,'callerCandidates'), { candidate: e.candidate.toJSON() });
    }
  };

  // Create offer for overlay
  const offer = await overlayPc.createOffer();
  await overlayPc.setLocalDescription(offer);

  // Write offer to Firestore — overlay will pick this up
  await updateDoc(broadcastRef,{
    status:'on-air',
    callerOffer:{ type:offer.type, sdp:offer.sdp }
  });

  // Listen for overlay's answer
  const unsubOverlay = onSnapshot(broadcastRef, async (snap)=>{
    const data = snap.data();
    if(data?.overlayAnswer && overlayPc && !overlayPc.remoteDescription){
      await overlayPc.setRemoteDescription(new RTCSessionDescription(data.overlayAnswer));
      unsubOverlay();
    }
  });

  // Listen for overlay ICE candidates
  onSnapshot(collection(broadcastRef,'overlayCandidates'), (snap)=>{
    snap.docChanges().forEach(async change=>{
      if(change.type==='added' && overlayPc){
        try{ await overlayPc.addIceCandidate(new RTCIceCandidate(change.doc.data().candidate)); }
        catch(e){}
      }
    });
  });
}

async function handleCallEnded(){
  clearInterval(timerInterval);
  if(dashboardPc){ dashboardPc.close(); dashboardPc=null; }
  if(overlayPc){ overlayPc.close(); overlayPc=null; }
  if(unsubCall){ unsubCall(); unsubCall=null; }
  if(unsubBroadcast){ unsubBroadcast(); unsubBroadcast=null; }
  inCallView.style.display='none';
  endedView.classList.add('show');
}

endCallBtn.addEventListener('click', async ()=>{
  if(callDocRef) await updateDoc(callDocRef,{status:'ended'});
  handleCallEnded();
});

callAgainBtn.addEventListener('click',()=> window.location.reload());
</script>
</body>
</html>
